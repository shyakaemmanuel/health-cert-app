services:
  # PostgreSQL Database (Deploy First)
  - type: pserv
    name: health-cert-db
    runtime: postgres
    plan: free
    region: ohio
    ipAllowList: []

  # Backend API
  - type: web
    name: health-cert-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: health-cert-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: LOG_LEVEL
        value: info
    healthCheckPath: /api/health
    healthCheckTimeout: 30
    autoDeploy: true

  # Frontend Static Site
  - type: static
    name: health-cert-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - path: /*
        destination: /index.html
    autoDeploy: true
